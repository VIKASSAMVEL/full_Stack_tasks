<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Feedback</title>
    <link rel="stylesheet" href="../task_01/style.css">
    <style>
        .highlight { border: 2px solid #007bff; background-color: #e8f0fe; }
        .feedback-box { width: 100%; min-height: 100px; margin-top: 10px; }
        .btn-submit { background-color: #28a745; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <h1>Interactive Feedback Form</h1>
        <p>Double-click the submit button once done!</p>
        <form id="feedbackForm">
            <div class="form-group">
                <label for="userName">Name:</label>
                <input type="text" id="userName" onkeypress="validateName(event)" placeholder="Keypress validation active">
            </div>
            <div class="form-group">
                <label for="comment">Your Feedback:</label>
                <textarea id="comment" class="feedback-box" onmouseover="addHighlight(this)" onmouseout="removeHighlight(this)" placeholder="Hover to highlight"></textarea>
            </div>
            <button type="button" class="btn-submit" ondblclick="confirmSubmit()">Submit Feedback (Double Click)</button>
        </form>
    </div>

    <script>
        function validateName(event) {
            const charCode = event.which ? event.which : event.keyCode;
            // Prevent numeric entry for Name
            if (charCode > 31 && (charCode < 48 || charCode > 57)) {
                return true;
            }
            alert("Please enter only letters!");
            event.preventDefault();
            return false;
        }

        function addHighlight(element) {
            element.classList.add('highlight');
        }

        function removeHighlight(element) {
            element.classList.remove('highlight');
        }

        function confirmSubmit() {
            const name = document.getElementById('userName').value;
            if (!name) {
                alert("Please fill your name first!");
                return;
            }
            alert("Success! Feedback submitted for " + name);
        }
    </script>
</body>
</html>
